services:
  npc:
    build:
      context: .
      dockerfile: Dockerfile
    image: npc:1.0.1
    container_name: npc
    restart: always
    init: true
    volumes:
      - ./app:/app
    environment:
      TZ: Asia/Shanghai
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - npc-net

  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: always
    volumes:
      - ./app:/home/coder/project
    environment:
      PASSWORD: "12345678"
    user: "501:20"
    working_dir: /home/coder/project
    networks:
      - npc-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token 你的token
    networks:
      - npc-net

networks:
  npc-net:
    driver: bridge
