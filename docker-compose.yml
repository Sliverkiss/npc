services:
  npc:
    build:
      context: .
      dockerfile: Dockerfile
    image: npc:1.0.1
    container_name: npc
    restart: always
    init: true
    network_mode: host
    volumes:
      - ./app:/app
    environment:
      TZ: Asia/Shanghai
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: always
    ports:
      - "10873:8080"
    volumes:
      - ./app:/home/coder/project
    environment:
      PASSWORD: "12345678"
    user: "501:20"
    working_dir: /home/coder/project

networks: {}
